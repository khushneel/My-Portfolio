<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <!-- Brand gradient: purple → cyan (matches portfolio) -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6c63ff"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <!-- Gloss highlight on top half -->
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <!-- Soft shadow for K depth -->
    <filter id="kshadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <!-- Gloss overlay -->
  <rect width="100" height="52" rx="22" fill="url(#shine)"/>

  <!-- K letterform — bold geometric, white -->
  <g fill="white" filter="url(#kshadow)">
    <!-- Vertical stem -->
    <rect x="19" y="16" width="15" height="68" rx="2"/>
    <!-- Upper diagonal arm (center → top-right) -->
    <polygon points="29,36 39,50 81,21 71,7"/>
    <!-- Lower diagonal arm (center → bottom-right) -->
    <polygon points="39,50 29,64 71,93 81,79"/>
  </g>
</svg>
